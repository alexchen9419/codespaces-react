server {
    listen 80;
    server_name _;

    root /workspaces/codespaces-react/dist;
    index index.html;

    # 語音檔案直接由 Nginx 提供，不走 PHP
    location /uploads/ {
        alias /workspaces/codespaces-react/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # PHP API — 轉給 PHP-FPM
    location /api/ {
        root /workspaces/codespaces-react/backend;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /workspaces/codespaces-react/backend$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # PHP session cookie
        fastcgi_param HTTP_COOKIE $http_cookie;
        fastcgi_pass_header Set-Cookie;

        # 防止慢請求拖垮 worker
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;
    }

    # React SPA — 所有其他路徑回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 不允許存取後端原始碼
    location ~ /backend/ {
        deny all;
    }

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}
