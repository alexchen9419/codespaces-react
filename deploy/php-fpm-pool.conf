; PHP-FPM pool 設定（針對 50 人併發調整）
; 放置路徑：/etc/php/8.3/fpm/pool.d/socialapp.conf
; （同時停用預設的 www.conf 或直接覆蓋）

[socialapp]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; --- 核心：worker 數量設定 ---
; 50 人併發，每個 PHP-FPM worker 約 25–35 MB
; 60 workers × 30 MB ≈ 1.8 GB RAM
pm = dynamic
pm.max_children = 60        ; 最多 60 個 worker（略多於 50，留緩衝）
pm.start_servers = 15       ; 啟動時預建 15 個
pm.min_spare_servers = 10   ; 閒置時保留至少 10 個（快速響應突發）
pm.max_spare_servers = 25   ; 閒置時最多 25 個
pm.max_requests = 500       ; 每個 worker 處理 500 次請求後自動重建（防記憶體洩漏）

; --- 逾時設定 ---
request_terminate_timeout = 30s

; --- PHP 設定覆寫 ---
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 20M
php_admin_value[memory_limit] = 64M
php_admin_value[max_execution_time] = 30

; --- Session：預設 file-based，50 人夠用 ---
; 如果之後擴展到多台機器，改成 Redis：
; php_admin_value[session.save_handler] = redis
; php_admin_value[session.save_path] = "tcp://127.0.0.1:6379"
